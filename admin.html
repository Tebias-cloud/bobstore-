<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | BobStore</title>
    <link rel="stylesheet" href="css/style.css?v=5">
    <style>
        body { padding: 40px 20px; max-width: 800px; margin: 0 auto; }
        .admin-header { text-align: center; margin-bottom: 40px; }
        .admin-header h2 { font-weight: 600; letter-spacing: 2px; text-transform: uppercase; font-size: 1.4rem; color: #fff;}
        
        .panel { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.03); margin-bottom: 30px; }
        .panel h3 { margin-bottom: 25px; color: #fff; font-size: 1.1rem; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        input, textarea { width: 100%; padding: 15px; background: #0f0f11; border: 1px solid #222; border-radius: 8px; color: white; font-size: 0.95rem; outline: none; margin-bottom: 15px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--text-muted); }

        .inventory-list { display: flex; flex-direction: column; gap: 15px; }
        .inventory-item { display: flex; align-items: center; justify-content: space-between; background: #0f0f11; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); }
        .item-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .item-img { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; border: 1px solid #222; }
        .item-details h4 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; text-transform: uppercase; }
        .item-details p { color: var(--text-muted); font-weight: 600; font-size: 0.85rem; }

        .item-actions { display: flex; gap: 10px; }
        .btn-action { background: transparent; color: #fff; border: 1px solid #444; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; }
        .btn-edit:hover { border-color: #fff; background: rgba(255,255,255,0.05); }
        .btn-delete:hover { background: #3a1111; border-color: #8a2222; color: #ff8888; }
        
        @media (max-width: 600px) { .inventory-item { flex-direction: column; align-items: flex-start; } .item-actions { width: 100%; justify-content: space-between; margin-top: 10px; } .btn-action { flex: 1; text-align: center; } }
    </style>
</head>
<body>
    <div class="admin-header">
        <h2>Panel de Control</h2>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase;">Gestión de inventario</p>
    </div>
    
    <div class="panel">
        <h3 id="form-titulo">Subir Nuevo Producto</h3>
        
        <input type="text" id="nombre" placeholder="Nombre del producto">
        <input type="number" id="precio" placeholder="Precio en CLP (ej: 25000)">
        <textarea id="descripcion" placeholder="Descripción detallada" rows="4"></textarea>
        
        <label style="display: block; margin-bottom: 10px; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Imágenes (Múltiples permitidas)</label>
        <p id="edit-notice" style="display:none; font-size: 0.85rem; color: var(--text-main); margin-bottom: 15px;">Modo edición activado.</p>
        
        <input type="file" id="fotos" accept="image/*" multiple>
        
        <button id="btnSubir" class="btn-solid" style="margin-top: 15px;">PUBLICAR EN CATÁLOGO</button>
        <button id="btnCancelar" class="btn-outline" style="display:none; margin-top: 10px;">CANCELAR EDICIÓN</button>
        
        <p id="estado" style="text-align:center; margin-top:20px; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;"></p>
    </div>

    <div class="panel">
        <h3>Inventario Actual</h3>
        <div id="lista-inventario" class="inventory-list">
            <p style="text-align: center; color: var(--text-muted); font-size: 0.85rem;">Cargando registros...</p>
        </div>
    </div>

    <script type="module">
        import { db, storage } from "./js/firebase-config.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { collection, addDoc, getDocs, doc, deleteDoc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const formatearCLP = (numero) => new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(numero);

        const btnSubir = document.getElementById('btnSubir');
        const btnCancelar = document.getElementById('btnCancelar');
        const estado = document.getElementById('estado');
        const formTitulo = document.getElementById('form-titulo');
        const editNotice = document.getElementById('edit-notice');
        
        let modoEdicion = false;
        let idProductoEditando = null;
        let imagenesActuales = [];
        let catalogoGlobal = {};

        // Motor de compresión de imágenes
        const comprimirImagen = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        const MAX_WIDTH = 1200;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        canvas.toBlob((blob) => {
                            const compressedFile = new File([blob], file.name.replace(/\.[^/.]+$/, ".jpg"), {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            resolve(compressedFile);
                        }, 'image/jpeg', 0.75);
                    };
                };
            });
        };

        async function cargarInventario() {
            const lista = document.getElementById('lista-inventario');
            try {
                const q = query(collection(db, "productos"), orderBy("fecha", "desc"));
                const docs = await getDocs(q);
                
                if (docs.empty) {
                    lista.innerHTML = "<p style='text-align:center; color: var(--text-muted); font-size: 0.85rem;'>Inventario vacío.</p>";
                    return;
                }

                lista.innerHTML = "";
                docs.forEach(docSnap => {
                    const p = docSnap.data();
                    const id = docSnap.id;
                    catalogoGlobal[id] = p;
                    
                    const galeria = p.imagenes || [p.imagen];
                    const imgThumb = galeria[0] || 'assets/placeholder.jpg';

                    lista.innerHTML += `
                        <div class="inventory-item">
                            <div class="item-info">
                                <img src="${imgThumb}" class="item-img">
                                <div class="item-details">
                                    <h4>${p.nombre}</h4>
                                    <p>${formatearCLP(p.precio)}</p>
                                </div>
                            </div>
                            <div class="item-actions">
                                <button class="btn-action btn-edit" onclick="prepararEdicion('${id}')">Editar</button>
                                <button class="btn-action btn-delete" onclick="borrarProducto('${id}')">Eliminar</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                lista.innerHTML = "<p style='color: #ff4500; text-align: center; font-size: 0.85rem;'>Error de lectura.</p>";
            }
        }

        window.borrarProducto = async (id) => {
            if (confirm("Confirmar eliminación de producto.")) {
                try {
                    await deleteDoc(doc(db, "productos", id));
                    cargarInventario();
                } catch (error) {
                    console.error("Error:", error);
                    alert("Error al eliminar.");
                }
            }
        }

        window.prepararEdicion = (id) => {
            const producto = catalogoGlobal[id];
            
            document.getElementById('nombre').value = producto.nombre;
            document.getElementById('precio').value = producto.precio;
            document.getElementById('descripcion').value = producto.descripcion || '';
            
            modoEdicion = true;
            idProductoEditando = id;
            imagenesActuales = producto.imagenes || [producto.imagen];
            
            formTitulo.innerText = "Editando: " + producto.nombre;
            btnSubir.innerText = "GUARDAR CAMBIOS";
            btnCancelar.style.display = "block";
            editNotice.style.display = "block";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        btnCancelar.addEventListener('click', () => {
            resetearFormulario();
        });

        function resetearFormulario() {
            modoEdicion = false;
            idProductoEditando = null;
            imagenesActuales = [];
            
            document.getElementById('nombre').value = "";
            document.getElementById('precio').value = "";
            document.getElementById('descripcion').value = "";
            document.getElementById('fotos').value = "";
            
            formTitulo.innerText = "Subir Nuevo Producto";
            btnSubir.innerText = "PUBLICAR EN CATÁLOGO";
            btnCancelar.style.display = "none";
            editNotice.style.display = "none";
            estado.innerText = "";
        }

        btnSubir.addEventListener('click', async () => {
            const nombre = document.getElementById('nombre').value;
            const precio = parseInt(document.getElementById('precio').value);
            const desc = document.getElementById('descripcion').value;
            const archivos = document.getElementById('fotos').files;

            if (!nombre || isNaN(precio)) return alert("Nombre y precio son obligatorios.");
            if (!modoEdicion && archivos.length === 0) return alert("Se requiere al menos una imagen.");

            btnSubir.disabled = true;

            try {
                let urlsImagenes = imagenesActuales;

                if (archivos.length > 0) {
                    urlsImagenes = [];
                    for (let i = 0; i < archivos.length; i++) {
                        estado.innerText = `Optimizando y subiendo archivo ${i + 1} de ${archivos.length}...`;
                        const rawFile = archivos[i];
                        
                        const compressedFile = await comprimirImagen(rawFile);
                        
                        const storageRef = ref(storage, `productos/${Date.now()}_${compressedFile.name}`);
                        await uploadBytes(storageRef, compressedFile);
                        const url = await getDownloadURL(storageRef);
                        urlsImagenes.push(url);
                    }
                }

                if (modoEdicion) {
                    estado.innerText = "Actualizando base de datos...";
                    await updateDoc(doc(db, "productos", idProductoEditando), {
                        nombre: nombre,
                        precio: precio,
                        descripcion: desc,
                        imagenes: urlsImagenes
                    });
                } else {
                    estado.innerText = "Registrando en catálogo...";
                    await addDoc(collection(db, "productos"), {
                        nombre: nombre,
                        precio: precio,
                        descripcion: desc,
                        imagenes: urlsImagenes,
                        fecha: serverTimestamp()
                    });
                }

                estado.innerText = "Proceso completado con éxito.";
                setTimeout(() => {
                    resetearFormulario();
                    cargarInventario();
                    btnSubir.disabled = false;
                }, 1500);

            } catch (error) {
                console.error(error);
                estado.innerText = "Error en el servidor. Intenta de nuevo.";
                btnSubir.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', cargarInventario);
    </script>
</body>
</html>
